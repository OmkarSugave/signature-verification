<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Signature Verification</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 420px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h2 {
            color: #1e3c72;
        }

        input[type="file"] {
            margin: 10px 0;
            width: 100%;
        }

        button {
            background: #1e3c72;
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
        }

        button:hover {
            background: #163060;
        }

        .result {
            margin-top: 20px;
            font-weight: bold;
        }

        .success { color: green; }
        .warning { color: orange; }
        .error { color: red; }

        .score {
            font-size: 14px;
            color: gray;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Signature Verification</h2>

    <form method="POST" enctype="multipart/form-data">

        <p><b>Reference Signature</b></p>
        <input type="file" name="file1" required>

        <p><b>Test Signature</b></p>
        <input type="file" name="file2" required>

        <button type="submit">Verify</button>
    </form>

    {% if result %}
        <div class="result 
            {% if 'Genuine' in result %}success
            {% elif 'Suspicious' in result %}warning
            {% else %}error
            {% endif %}">
            {{ result }}
        </div>

        <div class="score">
            Similarity Score: {{ score }}
        </div>
    {% endif %}
</div>

</body>
</html>
